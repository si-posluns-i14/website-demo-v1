name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site (Vite)
        # Pass the repo name so the asset base resolves to /<repo-name>/.
        env:
          PAGES_BASE_PATH: ${{ github.event.repository.name }}
        run: npm run build

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
